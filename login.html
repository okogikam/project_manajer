<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - Project Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#0f172a;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow:hidden;
      position:relative;
    }

    /* =========================
       BACKGROUND
    ========================= */

    .bg-circle{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:0.3;
      z-index:1;
    }

    .bg-circle.one{
      width:300px;
      height:300px;
      background:#2563eb;
      top:-100px;
      left:-100px;
    }

    .bg-circle.two{
      width:280px;
      height:280px;
      background:#7c3aed;
      bottom:-120px;
      right:-80px;
    }

    /* =========================
       LOGIN CARD
    ========================= */

    .login-wrapper{
      width:100%;
      max-width:420px;
      position:relative;
      z-index:2;
    }

    .login-card{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:28px;
      padding:40px;
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
    }

    .logo{
      width:72px;
      height:72px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      margin:0 auto 24px;
      color:white;
      font-weight:700;
    }
    .logo img{
      width: 80px;
      height: 80px;
      border-radius: 16px;
    }

    .title{
      text-align:center;
      color:white;
      margin-bottom:8px;
      font-size:30px;
      font-weight:700;
    }

    .subtitle{
      text-align:center;
      color:#cbd5e1;
      font-size:14px;
      margin-bottom:32px;
      line-height:1.7;
    }

    /* =========================
       FORM
    ========================= */

    .form-group{
      margin-bottom:20px;
    }

    .form-group label{
      display:block;
      color:#e2e8f0;
      font-size:14px;
      font-weight:600;
      margin-bottom:8px;
    }

    .input-box{
      position:relative;
    }

    .input-box input{
      width:100%;
      padding:15px 16px;
      border:none;
      border-radius:16px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:14px;
      outline:none;
      transition:0.2s;
    }

    .input-box input::placeholder{
      color:#94a3b8;
    }

    .input-box input:focus{
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.1);
    }

    /* =========================
       OPTIONS
    ========================= */

    .options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
      flex-wrap:wrap;
      gap:10px;
    }

    .remember{
      display:flex;
      align-items:center;
      gap:8px;
      color:#cbd5e1;
      font-size:13px;
    }

    .remember input{
      accent-color:#2563eb;
    }

    .forgot{
      color:#93c5fd;
      font-size:13px;
      text-decoration:none;
    }

    /* =========================
       BUTTON
    ========================= */

    .btn-login{
      width:100%;
      border:none;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:white;
      padding:15px;
      border-radius:16px;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      transition:0.25s;
    }

    .btn-login:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 24px rgba(37,99,235,0.35);
    }

    /* =========================
       FOOTER
    ========================= */

    .footer{
      text-align:center;
      color:#94a3b8;
      font-size:13px;
      margin-top:24px;
      line-height:1.7;
    }

    .footer a{
      color:#93c5fd;
      text-decoration:none;
      font-weight:600;
    }

    /* =========================
       MOBILE
    ========================= */

    @media(max-width:500px){

      .login-card{
        padding:30px 24px;
      }

      .title{
        font-size:26px;
      }

    }

  </style>
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg-circle one"></div>
  <div class="bg-circle two"></div>

  <!-- LOGIN -->
  <div class="login-wrapper">

    <div class="login-card">

      <!-- LOGO -->
      <div class="logo">
        <img src="./disk/img/icon_kotak.png" alt="Project Manager Logo">
      </div>

      <!-- TITLE -->
      <h1 class="title">
        Project Management
      </h1>

      <p class="subtitle">
        Login untuk mengelola proyek, task, dokumen, dan aktivitas tim.
      </p>

      <!-- FORM -->
      <form>

        <!-- EMAIL -->
        <div class="form-group">

          <label>Email</label>

          <div class="input-box">
            <input 
              type="email"
              placeholder="Masukkan email"
            >
          </div>

        </div>

        <!-- PASSWORD -->
        <div class="form-group">

          <label>Password</label>

          <div class="input-box">
            <input 
              type="password"
              placeholder="Masukkan password"
            >
          </div>

        </div>

        <!-- OPTIONS -->
        <div class="options">

          <label class="remember">
            <input type="checkbox">
            Remember me
          </label>

          <a href="#" class="forgot">
            Lupa password?
          </a>

        </div>

        <!-- BUTTON -->
        <a href="./pages/dashboard/">
          <button type="button" class="btn-login">
            Login
          </button>
        </a>
      </form>

      <!-- FOOTER -->
      <div class="footer">
        © 2026 Project Management System <br>
        Dibuat untuk monitoring dan kolaborasi tim.
      </div>

    </div>

  </div>

</body>
</html>
