
<!-- MAIN -->
<main class="main">

  <div class="topbar">
    <h1>Dashboard</h1>

    <div class="profile">
      Admin Project
    </div>
  </div>

  <!-- SUMMARY -->
  <section class="cards">

    <div class="card" id="card-project">      
    </div>

    <div class="card" id="card-task-done">
    </div>

    <div class="card" id="card-task-notdone">
    </div>

    <div class="card" id="card-deadline">
    </div>

  </section>

  <!-- CONTENT -->
  <section class="content-grid">

    <div class="panel">
      <h2>Daftar Task</h2>

      <table>
        <thead>
          <tr>
            <th>Task</th>
            <th>Project</th>
            <th>Status</th>
            <th>Deadline</th>
          </tr>
        </thead>

        <tbody id="dataTask">          
        </tbody>
      </table>
    </div>

    <!-- ACTIVITY -->
    <div class="panel">
      <h2>Aktivitas Terbaru</h2>

      <div class="activity-list" id="logList">
      </div>
    </div>

  </section>

</main>
